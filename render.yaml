# Render.com Configuration
# Save this as render.yaml in your repository root

services:
  # Backend API Service
  - type: web
    name: social-auto-publisher-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Add your API credentials in Render Dashboard
      # Don't put secrets here - use Render's Environment Variables section
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: LINKEDIN_ACCESS_TOKEN
        sync: false
      - key: LINKEDIN_PERSON_ID
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_ACCESS_TOKEN
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://your-app.netlify.app
